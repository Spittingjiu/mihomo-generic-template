    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/direct.txt
    path: ./ruleset/loyalsoldier/direct.txt
    interval: 86400

# ==================== 路由规则 ====================
rules:
  - RULE-SET,my_proxylist,节点选择
  - RULE-SET,my_whitelist,DIRECT
  - RULE-SET,reject,REJECT
  - RULE-SET,private,DIRECT
  - RULE-SET,lancidr,DIRECT,no-resolve
  - RULE-SET,openai,AI分流
  - RULE-SET,anthropic,AI分流
  - RULE-SET,youtube,YouTube分流
  - RULE-SET,telegram,Telegram分流
  - RULE-SET,google,Google
  - RULE-SET,github,节点选择
  - RULE-SET,apple,DIRECT
  - RULE-SET,microsoft,DIRECT
  - RULE-SET,loyalsoldier_gfw,节点选择
  - RULE-SET,loyalsoldier_direct,DIRECT
  - GEOIP,CN,DIRECT,no-resolve
  - RULE-SET,cncidr,DIRECT,no-resolve
  - MATCH,节点选择

# ==================== 策略组 ====================
proxy-groups:
  - name: 节点选择
    type: select
    proxies:
      - 手动选择
      - 独立选择
      - 自动选择
  - name: 手动选择
    type: select
    include-all: true
    proxies: []
    exclude-filter: "^(?i:(DIRECT|REJECT|PASS))$"
  - name: 独立选择
    type: select
    include-all: true
    proxies: []
    exclude-filter: "^(?i:(DIRECT|REJECT|PASS))$"
  - name: 自动选择
    type: url-test
    include-all: true
    proxies: []
    url: https://cp.cloudflare.com/generate_204
    interval: 600
    tolerance: 100
    exclude-filter: "^(?i:(DIRECT|REJECT|PASS))$"
  - name: AI分流
    type: select
    proxies:
      - 节点选择
      - 自动选择
  - name: YouTube分流
    type: select
    proxies:
      - 节点选择
      - 自动选择
  - name: Telegram分流
    type: select
    proxies:
      - 节点选择
      - 自动选择
  - name: Google
    type: select
    proxies:
      - 节点选择
      - 自动选择

# 隐私模板：由后端动态注入节点
proxies: []
