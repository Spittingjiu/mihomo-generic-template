  private:
    type: http
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Lan/Lan.yaml
    path: ./ruleset/blackmatrix7/Lan.yaml
    interval: 86400
  cncidr:
    type: http
    behavior: ipcidr
    format: text
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/cncidr.txt
    path: ./ruleset/loyalsoldier/cncidr.txt
    interval: 86400
  lancidr:
    type: http
    behavior: ipcidr
    format: text
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/lancidr.txt
    path: ./ruleset/loyalsoldier/lancidr.txt
    interval: 86400
  github:
    type: http
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.yaml
    path: ./ruleset/blackmatrix7/GitHub.yaml
    interval: 86400
  apple:
    type: http
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Apple/Apple.yaml
    path: ./ruleset/blackmatrix7/Apple.yaml
    interval: 86400
  microsoft:
    type: http
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Microsoft/Microsoft.yaml
    path: ./ruleset/blackmatrix7/Microsoft.yaml
    interval: 86400
  loyalsoldier_gfw:
    type: http
    behavior: domain
    format: text
