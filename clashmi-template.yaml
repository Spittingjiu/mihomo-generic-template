# 更新时间（北京时间）: 2026-04-02 15:35:56 CST
# 混合端口，支持 HTTP(S) 和 SOCKS5 代理
mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true
keep-alive-interval: 60
find-process-mode: strict
geodata-mode: false
geodata-loader: memconservative
geo-auto-update: true
geo-update-interval: 24

profile:
  tracing: true
  store-selected: true
  store-fake-ip: true

ntp:
  enable: true
  write-to-system: false
  server: time.apple.com
  port: 123

# ==================== DNS 核心配置 ====================
dns:
  enable: true
  listen: 127.0.0.1:1053
  use-hosts: true
  use-system-hosts: true
  skip-cert-verify: false
  ipv6: false
  prefer-h3: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - localhost.ptlogin2.qq.com
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"
    - time.*.com
    - time.*.gov
    - pool.ntp.org
    - "*.pool.ntp.org"
    - "+.qq.com"
    - "+.wechat.com"
    - "+.weixin.qq.com"
    - "geosite:cn"
    - "geosite:apple"
    - "geosite:microsoft@cn"

  default-nameserver:
    - 1.1.1.1
    - 8.8.8.8

  nameserver-policy:
    "geosite:cn":
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
    "geosite:geolocation-!cn":
      - https://1.1.1.1/dns-query
      - https://dns.google/dns-query

  nameserver:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  direct-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  direct-nameserver-follow-policy: true

  fallback:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

# ==================== 嗅探器配置 ====================
sniffer:
  enable: true
  override-destination: false
  sniff:
    TLS:
      ports:
        - 443
        - 8443
    QUIC:
      ports:
        - 443
        - 8443
    HTTP:
      ports:
        - 80
        - 8080-8880
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"
    - connectivitycheck.gstatic.com
    - connect.rom.miui.com
    - time.android.com
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.googlecast.com"
    - "geosite:cn"
    - "geosite:apple"

tun:
  enable: true
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53

# ==================== 规则集提供者 ====================
rule-providers:
  reject:
    type: http
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Advertising/Advertising_Classical.yaml
    path: ./ruleset/blackmatrix7/Advertising_Classical.yaml
    interval: 86400
  openai:
    type: http
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.yaml
    path: ./ruleset/blackmatrix7/OpenAI.yaml
    interval: 86400
  anthropic:
    type: http
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Anthropic/Anthropic.yaml
    path: ./ruleset/blackmatrix7/Anthropic.yaml
    interval: 86400
  youtube:
    type: http
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTube/YouTube.yaml
    path: ./ruleset/blackmatrix7/YouTube.yaml
    interval: 86400
  telegram:
    type: http
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.yaml
    path: ./ruleset/blackmatrix7/Telegram.yaml
    interval: 86400
  google:
    type: http
