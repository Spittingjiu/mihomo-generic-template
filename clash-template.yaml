# 更新时间（北京时间）: 2026-04-18 11:44:00 CST
# 混合端口，支持 HTTP(S) 和 SOCKS5 代理
mixed-port: 7890
# 是否允许局域网内的其他设备连接此代理
allow-lan: false
# 运行模式：rule (规则分流)、global (全局代理)、direct (全局直连)
mode: rule
# 日志输出级别
log-level: info
# 是否开启 IPv6 支持
ipv6: false
# 统一延迟，消除握手等带来的延迟误差
unified-delay: true
# 允许 TCP 并发连接，提高加载速度
tcp-concurrent: true

# 配置文件存储行为
profile:
  store-selected: true # 记忆手动选择的节点
  store-fake-ip: true  # 记忆 Fake-IP 映射，防止 DNS 污染和重复解析

# ==================== DNS 核心配置 ====================
dns:
  enable: true # 启用内置 DNS 服务器
  listen: 127.0.0.1:1053 # DNS 监听地址和端口
  ipv6: false
  respect-rules: true # DNS 查询是否尊重分流规则
  enhanced-mode: fake-ip # 增强模式：使用假 IP 极速响应并防污染
  fake-ip-range: 198.18.0.1/16 # Fake-IP 的分配网段
  
  # Fake-IP 过滤名单：这些域名返回真实 IP（常用于本地、路由和特定系统域名）
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - localhost.ptlogin2.qq.com
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"
    - time.*.com
    - time.*.gov
    - pool.ntp.org
    - "*.pool.ntp.org"
    - "+.qq.com"
    - "+.wechat.com"
    - "+.weixin.qq.com"
    - "geosite:cn"
    - "geosite:apple"
    - "geosite:microsoft@cn"

  # 默认 DNS：仅用于解析下方 DoH/DoT 的域名，必须是纯 IP
  default-nameserver:
    - 1.1.1.1
    - 8.8.8.8

  # 域名定向 DNS：按指定策略精准匹配，特定域名走特定 DNS
  nameserver-policy:
    "geosite:cn":
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
    "geosite:geolocation-!cn":
      - https://1.1.1.1/dns-query
      - https://dns.google/dns-query

  # 主 DNS：默认的加密解析服务器
  nameserver:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query

  # 代理节点域名的专属解析器
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query

  # 代理节点域名的定向解析策略
  proxy-server-nameserver-policy:
    "geosite:cn":
      - 223.5.5.5
      - 119.29.29.29

  # 直连流量专属 DNS
  direct-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  direct-nameserver-follow-policy: true

  # 兜底/备用 DNS
  fallback:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query

  # 备用 DNS 过滤机制：主要用于处理未匹配的国内 IP 回退
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

# ==================== 嗅探器配置 ====================
# 用于获取真实域名，修复透明代理下的路由分流问题
sniffer:
  enable: true
  sniff:
    TLS:
      ports:
        - 443
        - 8443
    HTTP:
      ports:
        - 80
        - 8080-8880
  # 忽略嗅探的域名列表（避免部分应用如米家、系统推送等工作异常）
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"
    - connectivitycheck.gstatic.com
    - connect.rom.miui.com
    - time.android.com
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.googlecast.com"
    - "geosite:cn"
    - "geosite:apple"

# ==================== 规则集提供者 ====================
