    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/cncidr.txt
    path: ./ruleset/loyalsoldier/cncidr.txt
    interval: 86400
  lancidr:
    type: http
    behavior: ipcidr
    format: text
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/lancidr.txt
    path: ./ruleset/loyalsoldier/lancidr.txt
    interval: 86400

# ==================== 路由规则 ====================
# 按从上到下的顺序严格匹配，一旦命中即停止匹配
rules:
  - RULE-SET,my_proxylist,节点选择 # 你的自定义黑名单优先拦截
  - RULE-SET,my_whitelist,DIRECT # 你的自定义白名单走直连
  - RULE-SET,reject,REJECT # 广告拦截
  - RULE-SET,private,DIRECT # 局域网直连
  - RULE-SET,lancidr,DIRECT,no-resolve # 局域网 IP 直连 (不进行 DNS 解析)
  - RULE-SET,openai,AI分流
  - RULE-SET,anthropic,AI分流
  - RULE-SET,youtube,YouTube分流
  - RULE-SET,telegram,Telegram分流
  - RULE-SET,google,Google
  - RULE-SET,proxy,节点选择
  - GEOSITE,geolocation-!cn,节点选择 # 非中国大陆域名走代理
  - RULE-SET,direct,DIRECT # 中国大陆规则集走直连
  - GEOSITE,cn,DIRECT # 中国大陆域名走直连
  - RULE-SET,cncidr,DIRECT,no-resolve # 中国大陆 IP 走直连 (不进行 DNS 解析)
  - MATCH,节点选择 # 全局兜底规则：以上都没匹配到的流量全走代理

# ==================== 策略组 ====================
# 用于在不同节点间进行选择或提供自动化策略
proxy-groups:
  - name: 节点选择
    type: select
    proxies:
      - 手动选择
      - 独立选择
      - 自动选择

  - name: 手动选择
    type: select
    include-all: true
    proxies: []
    exclude-filter: "^(?i:(DIRECT|REJECT|PASS))$"

  - name: 独立选择
    type: select
    include-all: true
    proxies: []
    exclude-filter: "^(?i:(DIRECT|REJECT|PASS))$"

  - name: AI分流
    type: select
    include-all: true
    proxies: []
    exclude-filter: "^(?i:(DIRECT|REJECT|PASS))$"

  - name: YouTube分流
    type: select
    include-all: true
    proxies: []
    exclude-filter: "^(?i:(DIRECT|REJECT|PASS))$"

  - name: Telegram分流
    type: select
    include-all: true
    proxies: []
    exclude-filter: "^(?i:(DIRECT|REJECT|PASS))$"

  - name: Google
    type: select
    include-all: true
    proxies: []
    exclude-filter: "^(?i:(DIRECT|REJECT|PASS))$"

  - name: 自动选择
    type: url-test
    include-all: true
    proxies: []
    url: https://cp.cloudflare.com/generate_204
    interval: 600
    tolerance: 100
    exclude-filter: "^(?i:(DIRECT|REJECT|PASS))$"
