    behavior: domain
    format: text
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Advertising/Advertising.list
    path: ./ruleset/blackmatrix7/Advertising.list
    interval: 86400
  direct:
    type: http
    behavior: domain
    format: text
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/ChinaMax/ChinaMax.list
    path: ./ruleset/blackmatrix7/ChinaMax.list
    interval: 86400
  proxy:
    type: http
    behavior: domain
    format: text
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Global/Global.list
    path: ./ruleset/blackmatrix7/Global.list
    interval: 86400
  openai:
    type: http
    behavior: domain
    format: text
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.list
    path: ./ruleset/blackmatrix7/OpenAI.list
    interval: 86400
  anthropic:
    type: http
    behavior: domain
    format: text
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Anthropic/Anthropic.list
    path: ./ruleset/blackmatrix7/Anthropic.list
    interval: 86400
  youtube:
    type: http
    behavior: domain
    format: text
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTube/YouTube.list
    path: ./ruleset/blackmatrix7/YouTube.list
    interval: 86400
  telegram:
    type: http
    behavior: domain
    format: text
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.list
    path: ./ruleset/blackmatrix7/Telegram.list
    interval: 86400
  google:
    type: http
    behavior: domain
    format: text
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.list
    path: ./ruleset/blackmatrix7/Google.list
    interval: 86400
  my_proxylist:
    type: http
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/Spittingjiu/mihomo-custom-rules/main/my_proxylist.yaml?v=56018b363525
    path: ./ruleset/custom/my_proxylist.yaml
    interval: 86400
  my_whitelist:
    type: http
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/Spittingjiu/mihomo-custom-rules/main/my_whitelist.yaml?v=56018b363525
    path: ./ruleset/custom/my_whitelist.yaml
    interval: 86400
  private:
    type: http
    behavior: domain
    format: text
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Lan/Lan.list
    path: ./ruleset/blackmatrix7/Lan.list
