mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true

profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  listen: 127.0.0.1:1053
  ipv6: false
  follow-rule: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  # 仅用于解析 DNS 服务器域名，官方要求这里使用 IP
  default-nameserver:
    - 223.5.5.5
    - 223.6.6.6

  # 上游 DNS（混合国内 + 海外）
  nameserver:
    - 223.5.5.5
    - 223.6.6.6
    - 1.1.1.1
    - 8.8.8.8

  # 域名定向 DNS（不使用 geosite）
  nameserver-policy:
    '+.zzao.de': 223.5.5.5
    '+.fengqi0216.top': 223.5.5.5
    '+.qq.com': 223.5.5.5
    '+.wechat.com': 223.5.5.5
    '+.weixin.qq.com': 223.5.5.5
    '+.baidu.com': 223.5.5.5
    '+.bilibili.com': 223.5.5.5
    '+.jd.com': 223.5.5.5
    '+.taobao.com': 223.5.5.5
    '+.alicdn.com': 223.5.5.5
    '+.douyin.com': 223.5.5.5
    '+.amap.com': 223.5.5.5
    '+.163.com': 223.5.5.5
    '+.126.net': 223.5.5.5
    '+.openai.com': 1.1.1.1
    '+.anthropic.com': 1.1.1.1
    '+.google.com': 1.1.1.1
    '+.youtube.com': 1.1.1.1
    '+.telegram.org': 1.1.1.1
    '+.t.me': 1.1.1.1
    '+.github.com': 1.1.1.1
    '+.discord.com': 1.1.1.1
    '+.x.com': 1.1.1.1
    '+.twitter.com': 1.1.1.1
    '+.facebook.com': 1.1.1.1
    '+.instagram.com': 1.1.1.1
    '+.netflix.com': 1.1.1.1

  # 节点域名解析
  proxy-server-nameserver:
    - 223.5.5.5
    - 223.6.6.6
    - 1.1.1.1
    - 8.8.8.8

  proxy-server-nameserver-policy:
    '+.zzao.de': 223.5.5.5
    '+.fengqi0216.top': 223.5.5.5

  # 直连查询优先国内
  direct-nameserver:
    - 223.5.5.5
    - 223.6.6.6
  direct-nameserver-follow-policy: true

  # 后备 DNS
  fallback:
    - 1.1.1.1
    - 8.8.8.8

  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '*.msftconnecttest.com'
    - '*.msftncsi.com'
    - pool.ntp.org
    - '*.pool.ntp.org'

sniffer:
  enable: true
  sniff:
    TLS:
      ports:
        - 443
        - 8443
    HTTP:
      ports:
        - 80
        - 8080-8880
  skip-domain:
    - 'Mijia Cloud'
    - '+.push.apple.com'
    - connectivitycheck.gstatic.com
    - connect.rom.miui.com
    - time.android.com
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'
    - '+.googlecast.com'

rule-providers:
  reject:
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Advertising/Advertising_Classical.yaml
    interval: 86400

  direct:
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/ChinaMax/ChinaMax_Classical.yaml
    interval: 86400

  proxy:
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Global/Global_Classical.yaml
    interval: 86400

  openai:
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.yaml
    interval: 86400

  anthropic:
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Anthropic/Anthropic.yaml
    interval: 86400

  youtube:
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTube/YouTube.yaml
    interval: 86400

  telegram:
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.yaml
    interval: 86400

  google:
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.yaml
    interval: 86400

  my_whitelist:
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/Spittingjiu/clash-custom-rules/main/my_whitelist.yaml
    interval: 86400

  private:
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Lan/Lan.yaml
    interval: 86400

  cncidr:
    behavior: ipcidr
    format: text
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/cncidr.txt
    interval: 86400

  lancidr:
    behavior: ipcidr
    format: text
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/lancidr.txt
    interval: 86400

rules:
  - RULE-SET,my_whitelist,DIRECT
  - RULE-SET,reject,REJECT
  - RULE-SET,private,DIRECT
  - RULE-SET,lancidr,DIRECT,no-resolve
  - RULE-SET,openai,AI分流
  - RULE-SET,anthropic,AI分流
  - RULE-SET,youtube,YouTube分流
  - RULE-SET,telegram,Telegram分流
  - RULE-SET,google,Google分流
  - RULE-SET,proxy,节点选择
  - RULE-SET,direct,DIRECT
  - RULE-SET,cncidr,DIRECT,no-resolve
  - MATCH,节点选择

proxy-groups:
  - name: 节点选择
    type: select
    proxies:
      - 手动选择
      - 独立选择
      - 自动选择

  - name: 手动选择
    type: select
    include-all: true
    proxies: []
    exclude-filter: '^(?i:(DIRECT|REJECT|PASS))$'

  - name: 独立选择
    type: select
    include-all: true
    proxies: []
    exclude-filter: '^(?i:(DIRECT|REJECT|PASS))$'

  - name: AI分流
    type: select
    proxies:
      - 节点选择
      - 自动选择
    include-all: true
    exclude-filter: '^(?i:(DIRECT|REJECT|PASS))$'

  - name: YouTube分流
    type: select
    proxies:
      - 节点选择
      - 自动选择
    include-all: true
    exclude-filter: '^(?i:(DIRECT|REJECT|PASS))$'

  - name: Telegram分流
    type: select
    proxies:
      - 节点选择
      - 自动选择
    include-all: true
    exclude-filter: '^(?i:(DIRECT|REJECT|PASS))$'

  - name: Google分流
    type: select
    proxies:
      - 节点选择
      - 自动选择
    include-all: true
    exclude-filter: '^(?i:(DIRECT|REJECT|PASS))$'

  - name: 自动选择
    type: url-test
    include-all: true
    proxies: []
    url: https://cp.cloudflare.com/generate_204
    interval: 600
    tolerance: 100
    exclude-filter: '^(?i:(DIRECT|REJECT|PASS))$'

# 隐私模板：由后端动态注入节点
proxies: []
