mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true

profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  listen: 127.0.0.1:1053
  ipv6: false
  follow-rule: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  # 仅用于解析 DoH 服务器域名（必须是 IP）
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 纯净主解析：仅海外加密 DNS（严禁国内 DNS 出现在此数组）
  nameserver:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query

  # 严格策略分流：仅国内域名走国内 DNS
  nameserver-policy:
    'geosite:cn': 223.5.5.5
    '+.cn': 223.5.5.5
    '+.zzao.de': 223.5.5.5
    '+.fengqi0216.top': 223.5.5.5
    '+.qq.com': 223.5.5.5
    '+.wechat.com': 223.5.5.5
    '+.weixin.qq.com': 223.5.5.5

  # 节点域名解析（可使用国内 DNS 保证可达）
  # 节点域名解析（必须使用明文 IP，因为此时代理未建立，无法直连海外 DoH）
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 由 sub 动态注入节点域名（运行时注入）
  proxy-server-nameserver-policy: {}

  # 直连流量固定国内 DNS
  direct-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  direct-nameserver-follow-policy: true

  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '*.msftconnecttest.com'
    - '*.msftncsi.com'
    - pool.ntp.org
    - '*.pool.ntp.org'

sniffer:
  enable: true
  sniff:
    TLS:
      ports:
        - 443
        - 8443
    HTTP:
      ports:
        - 80
        - 8080-8880
  skip-domain:
    - 'Mijia Cloud'
    - '+.push.apple.com'
    - connectivitycheck.gstatic.com
    - connect.rom.miui.com
    - time.android.com
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'
    - '+.googlecast.com'

rule-providers:
  reject:
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Advertising/Advertising_Classical.yaml
    interval: 86400

  direct:
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/ChinaMax/ChinaMax_Classical.yaml
    interval: 86400

  proxy:
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Global/Global_Classical.yaml
    interval: 86400

  openai:
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.yaml
    interval: 86400

  anthropic:
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Anthropic/Anthropic.yaml
    interval: 86400

  youtube:
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTube/YouTube.yaml
    interval: 86400

  telegram:
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.yaml
    interval: 86400

  google:
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.yaml
    interval: 86400

  my_proxylist:
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/Spittingjiu/mihomo-custom-rules/main/my_proxylist.yaml
    interval: 86400

  my_whitelist:
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/Spittingjiu/mihomo-custom-rules/main/my_whitelist.yaml
    interval: 86400

  private:
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Lan/Lan.yaml
    interval: 86400

  cncidr:
    behavior: ipcidr
    format: text
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/cncidr.txt
    interval: 86400

  lancidr:
    behavior: ipcidr
    format: text
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/lancidr.txt
    interval: 86400

  github:
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.yaml
    interval: 86400

  apple:
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Apple/Apple.yaml
    interval: 86400

  microsoft:
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Microsoft/Microsoft.yaml
    interval: 86400

  loyalsoldier_gfw:
    behavior: domain
    format: text
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/gfw.txt
    interval: 86400

  loyalsoldier_direct:
    behavior: domain
    format: text
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/direct.txt
    interval: 86400

rules:
  - "DOMAIN-SUFFIX,cloudflare-dns.com,节点选择"
  - "DOMAIN-SUFFIX,dns.google,节点选择"
  - "RULE-SET,my_proxylist,节点选择"
  - "RULE-SET,my_whitelist,DIRECT"
  - "RULE-SET,reject,REJECT"
  - "RULE-SET,private,DIRECT"
  - "RULE-SET,lancidr,DIRECT,no-resolve"
  - "RULE-SET,openai,AI分流"
  - "RULE-SET,anthropic,AI分流"
  - "RULE-SET,youtube,YouTube分流"
  - "RULE-SET,telegram,Telegram分流"
  - "RULE-SET,google,Google"
  - "RULE-SET,github,节点选择"
  - "RULE-SET,apple,DIRECT"
  - "RULE-SET,microsoft,DIRECT"
  - "RULE-SET,loyalsoldier_gfw,节点选择"
  - "RULE-SET,loyalsoldier_direct,DIRECT"
  - "RULE-SET,proxy,节点选择"
  - "GEOSITE,geolocation-!cn,节点选择"
  - "RULE-SET,direct,DIRECT"
  - "GEOSITE,cn,DIRECT"
  - "GEOIP,CN,DIRECT,no-resolve"
  - "RULE-SET,cncidr,DIRECT,no-resolve"
  - "MATCH,节点选择"

proxy-groups:
  - name: "节点选择"
    type: select
    proxies:
      - "手动选择"
      - "独立选择"
      - "自动选择"

  - name: "手动选择"
    type: select
    include-all: true
    proxies: []
    exclude-filter: "^(?i:(DIRECT|REJECT|PASS))$"

  - name: "独立选择"
    type: select
    include-all: true
    proxies: []
    exclude-filter: "^(?i:(DIRECT|REJECT|PASS))$"

  - name: "AI分流"
    type: select
    proxies:
      - "节点选择"
      - "自动选择"
    include-all: true
    exclude-filter: "^(?i:(DIRECT|REJECT|PASS))$"

  - name: "YouTube分流"
    type: select
    proxies:
      - "节点选择"
      - "自动选择"
    include-all: true
    exclude-filter: "^(?i:(DIRECT|REJECT|PASS))$"

  - name: "Telegram分流"
    type: select
    proxies:
      - "节点选择"
      - "自动选择"
    include-all: true
    exclude-filter: "^(?i:(DIRECT|REJECT|PASS))$"

  - name: "Google"
    type: select
    proxies:
      - "节点选择"
      - "自动选择"
    include-all: true
    exclude-filter: "^(?i:(DIRECT|REJECT|PASS))$"

  - name: "自动选择"
    type: url-test
    include-all: true
    proxies: []
    url: https://cp.cloudflare.com/generate_204
    interval: 600
    tolerance: 100
    exclude-filter: "^(?i:(DIRECT|REJECT|PASS))$"

# 隐私模板：由后端动态注入节点
proxies: []
